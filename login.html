<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DataBot Admin — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #25D366;
      --green-dark: #128C7E;
      --bg: #0d1117;
      --card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sora', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image: radial-gradient(ellipse at 60% 30%, rgba(37,211,102,0.07) 0%, transparent 60%);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: var(--green);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }

    .logo h1 { font-size: 1.3rem; font-weight: 700; }
    .logo span { color: var(--muted); font-size: 0.8rem; }

    h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }

    label {
      display: block;
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input:focus { border-color: var(--green); }

    button {
      width: 100%;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 14px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    button:hover { background: #20c45a; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .error {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.4);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      color: #f85149;
      margin-bottom: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">📱</div>
      <div>
        <h1>DataBot</h1>
        <span>Admin Panel</span>
      </div>
    </div>

    <h2>Welcome back</h2>
    <p class="subtitle">Sign in to manage your orders and settings</p>

    <div class="error" id="errorMsg"></div>

    <label>Username</label>
    <input type="text" id="username" placeholder="admin" autocomplete="username"/>

    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter') login()"/>

    <button onclick="login()" id="loginBtn">Sign In</button>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/pages/dashboard.html';
    }

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errEl = document.getElementById('errorMsg');

      if (!username || !password) {
        showError('Please enter both username and password.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = '/pages/dashboard.html';
        } else {
          showError(data.error || 'Login failed. Check your credentials.');
        }
      } catch {
        showError('Cannot connect to server. Is the backend running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
